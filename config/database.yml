default: &default
  adapter: postgresql
  encoding: unicode
  username: myuser
  password: mypass
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: myapp_development
  username: myuser
  password: mypass


test:
  <<: *default
  database: my_project_test


#     url: <%= ENV["MY_APP_DATABASE_URL"] %>


production:
  primary: &primary_production
    <<: *default
    database: my_project_production
    username: myuser
    password: <%= ENV["MY_PROJECT_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: my_project_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: my_project_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: my_project_production_cable
    migrations_paths: db/cable_migrate


